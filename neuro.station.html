<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroStation</title>

<meta name="description" content="NeuroStation is an archive of knowledge, resources, discussions, discoveries and preserved information.">
<meta name="robots" content="index,follow">

<meta property="og:title" content="NeuroStation">
<meta property="og:description" content="Archive of knowledge. Join the community.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://neuro.station">

<meta name="theme-color" content="#0d1117">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#fff;
    font-family:Inter,Segoe UI,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%,rgba(88,101,242,.15),transparent 30%),
    radial-gradient(circle at 80% 80%,rgba(255,255,255,.03),transparent 40%);
}

.container{
    width:min(800px,90%);
    text-align:center;
    z-index:1;
}

.logo{
    font-size:84px;
    font-weight:900;
    margin-bottom:10px;
    letter-spacing:-4px;
}

h1{
    font-size:4rem;
    margin-bottom:20px;
}

.description{
    color:#a8b3cf;
    line-height:1.9;
    font-size:1.15rem;
    max-width:650px;
    margin:0 auto 35px;
}

.discord{
    display:inline-block;
    text-decoration:none;
    background:#5865F2;
    color:white;
    padding:18px 38px;
    border-radius:14px;
    font-weight:700;
    transition:.25s;
}

.discord:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 35px rgba(88,101,242,.4);
}

.socials{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

.socials a{
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:12px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    transition:.2s;
}

.socials a:hover{
    background:rgba(255,255,255,.08);
}

.footer{
    margin-top:40px;
    color:#687385;
    font-size:.9rem;
}

@media(max-width:768px){

    h1{
        font-size:2.5rem;
    }

    .logo{
        font-size:60px;
    }

    .description{
        font-size:1rem;
    }

}

</style>
</head>
<body>

<div class="bg"></div>

<div class="container">

    <div class="logo">N</div>

    <h1>NeuroStation</h1>

    <div class="description">
        NeuroStation is an archive of knowledge,
        resources, discussions, discoveries,
        documents, references, and preserved information
        collected by the community.
    </div>

    <a
        class="discord"
        href="https://discord.gg/x8b7wbPkt4"
        target="_blank"
        rel="noopener noreferrer">
        Join Discord
    </a>

    <div class="socials">

        <a href="https://instagram.com/neuroxini" target="_blank">
            Instagram
        </a>

        <a href="https://x.com/neuroxini" target="_blank">
            X
        </a>

        <a href="https://steamcommunity.com/id/neuroxini" target="_blank">
            Steam
        </a>

    </div>

    <div class="footer">
        neuro.station
    </div>

</div>

</body>
</html>
